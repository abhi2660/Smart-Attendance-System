<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2>Attendance Dashboard</h2>
    
    <table class="table table-bordered table-striped mt-3">
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Last Status</th>
                <th>Total Days</th>
                <th>View</th>
            </tr>
        </thead>
        <tbody>
            {% for p in people %}
            <tr>
                <td>{{ p.name }}</td>
                <td>{{ p.id }}</td>
                <td>{{ p.last }}</td>
                <td>{{ p.count }}</td>
                <td><a href="/person/{{ p.key }}" class="btn btn-primary btn-sm">Open</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
