<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm">
        <h1 class="text-4xl font-bold mb-6 text-center text-cyan-400">Admin Login</h1>
        
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500 text-white p-3 rounded-lg mb-4 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <div class="bg-gray-800 p-8 rounded-2xl shadow-xl">
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm font-bold mb-2" for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="admin" required class="w-full bg-gray-700 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div class="mb-6">
                    <label class="block text-gray-400 text-sm font-bold mb-2" for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="••••••••" required class="w-full bg-gray-700 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:scale-105 shadow-lg">
                        Sign In
                    </button>
                </div>
            </form>
            <a href="{{ url_for('index') }}" class="mt-6 text-center block w-full text-cyan-400 hover:text-cyan-300 text-sm">
                &larr; Back to Home
            </a>
        </div>
    </div>
</body>
</html>
