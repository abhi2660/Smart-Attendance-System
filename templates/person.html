<!DOCTYPE html>
<html>
<head>
    <title>Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <a href="/" class="btn btn-link">&larr; Back</a>
    
    <h2>{{ meta.Name }}</h2>
    <h5>ID: {{ meta.ID }}</h5>

    <table class="table table-bordered mt-4">
        <thead>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for date_obj, date_str, value in attendance %}
            <tr>
                <td>{{ date_str }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
