<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl text-center">
        <a href="{{ url_for('index') }}" class="text-cyan-400 hover:text-cyan-300 mb-4 inline-block">&larr; Back to Home</a>
        <h1 class="text-4xl font-bold mb-4 text-cyan-400">Scan Your QR Code</h1>
        
        <div id="status-container" class="mb-4 p-4 rounded-lg text-xl font-semibold transition-colors duration-500">
            <p id="status-message">Initializing camera...</p>
        </div>
        
        <div class="bg-gray-800 rounded-2xl shadow-xl overflow-hidden aspect-video">
             <img id="video-feed" src="{{ url_for('video_feed') }}" alt="Video Stream" class="w-full h-full object-cover">
        </div>
    </div>

    <script>
        const statusMessageEl = document.getElementById('status-message');
        const statusContainerEl = document.getElementById('status-container');
        const videoFeedEl = document.getElementById('video-feed');

        
        let isRedirecting = false;

        // Function to fetch the latest status from the server
        async function fetchStatus() {
            try {
                const response = await fetch('/get_status');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                
                statusMessageEl.textContent = data.message;
                statusContainerEl.style.backgroundColor = data.color;

                // If attendance is successful OR they are already marked present, and we are not already redirecting...
                if ((data.status === 'success' || data.status === 'info') && !isRedirecting && data.message.includes('present')) {
                    isRedirecting = true; // Set the flag
                    // Wait 2 seconds to show the message, then redirect.
                    setTimeout(() => {
                        window.location.href = "{{ url_for('index') }}";
                    }, 2000);
                }

            } catch (error) {
                console.error('Error fetching status:', error);
                statusMessageEl.textContent = 'Error connecting to server.';
                statusContainerEl.style.backgroundColor = '#dc3545'; // Red
            }
        }
        
        videoFeedEl.onerror = function() {
            statusMessageEl.textContent = "Camera feed failed to load. Is the camera in use?";
            statusContainerEl.style.backgroundColor = '#dc3545';
        };

        
        setInterval(fetchStatus, 1000);
    </script>
</body>
</html>
